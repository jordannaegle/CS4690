<!DOCTYPE html>
<html lang="en-US" data-bs-theme="light">

<head>
  <title>Student Logs</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="https://www.uvu.edu/favicon.ico">

  <!-- Bootstrap CSS: CDN with local fallback -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    id="bootstrapCSS">
  <script>
    // If Bootstrap CSS failed to load from CDN, load local copy
    document.addEventListener('DOMContentLoaded', function () {
      var testEl = document.createElement('div');
      testEl.className = 'collapse';
      document.body.appendChild(testEl);
      var bootstrapLoaded = window.getComputedStyle(testEl).display === 'none';
      document.body.removeChild(testEl);
      if (!bootstrapLoaded) {
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'lib/bootstrap.min.css';
        document.head.appendChild(link);
        console.log('Bootstrap CSS: Loaded from local fallback');
      } else {
        console.log('Bootstrap CSS: Loaded from CDN');
      }
    });
  </script>
</head>

<body class="bg-success-subtle min-vh-100 d-flex align-items-start justify-content-center py-5 px-3">

  <!-- Theme Toggle -->
  <button id="themeToggle" class="btn btn-outline-secondary rounded-circle position-fixed top-0 end-0 m-3 fs-4"
    style="width:50px;height:50px;z-index:1050;" aria-label="Toggle dark mode">🌙</button>

  <!-- Main Card -->
  <div class="card shadow-lg border-0 w-100" style="max-width: 640px;">
    <div class="card-body p-4">

      <!-- UVU Logo -->
      <img src="uvu-seal.jpg" alt="Utah Valley University Seal" id="uvuLogo"
        class="d-block mx-auto mb-3 rounded-circle object-fit-cover" width="140" height="140">

      <!-- Title -->
      <h1 class="text-center text-uppercase fw-bold fs-3 mb-4 text-success">Student Logs</h1>

      <!-- Course Select -->
      <form>
        <div class="mb-3">
          <select class="form-select" aria-label="Select Course" id="course" name="course" data-cy="course_select">
            <option selected value="">Choose Courses</option>
          </select>
        </div>

        <!-- UVU ID Input -->
        <div id="uvuIdContainer" style="display: none;">
          <label for="uvuId" class="form-label fw-semibold text-success">UVU ID</label>
          <input type="text" class="form-control" inputmode="numeric" pattern="[0-9]*" id="uvuId" name="uvuId"
            data-cy="uvuId_input" placeholder="01234567" maxlength="8" onkeypress="return /[0-9]/.test(event.key)">
        </div>

        <!-- Logs Section -->
        <div id="logsSection" style="display: none;">
          <h3 id="uvuIdDisplay" class="fw-semibold fs-5 mt-4 pb-2 border-bottom border-success border-3 text-success"
            data-cy="uvuIdDisplay">
            Student Logs for 10234567
          </h3>

          <ul class="list-unstyled mt-3" data-cy="logs">
            <li class="p-3 mb-2 rounded-end border-start border-success border-4 bg-body-secondary" role="button">
              <div><small class="text-muted fw-semibold">1/23/2021 1:23:36 PM</small></div>
              <pre
                class="mb-0 mt-2 bg-transparent border-0 font-monospace small"><p class="mb-0">Initial comment. Hello World</p></pre>
            </li>
            <li class="p-3 mb-2 rounded-end border-start border-success border-4 bg-body-secondary" role="button">
              <div><small class="text-muted fw-semibold">1/24/2021 2:43:12 PM</small></div>
              <pre
                class="mb-0 mt-2 bg-transparent border-0 font-monospace small"><p class="mb-0">MongoDB is looking really good, still need to get atlas up and running.</p></pre>
            </li>
            <li class="p-3 mb-2 rounded-end border-start border-success border-4 bg-body-secondary" role="button">
              <div><small class="text-muted fw-semibold">1/27/2021 5:58:10 PM</small></div>
              <pre
                class="mb-0 mt-2 bg-transparent border-0 font-monospace small"><p class="mb-0">Atlas is up and running</p></pre>
            </li>
          </ul>

          <!-- New Log -->
          <label class="form-label fw-semibold text-success">New Log</label>
          <textarea class="form-control mb-3" id="addLogTextarea" rows="3" aria-label="add log textarea"
            data-cy="log_textarea"></textarea>

          <button id="addLogBtn" type="submit" class="btn btn-success text-uppercase fw-bold w-100"
            data-cy="add_log_btn" disabled>Add Log</button>
        </div>
      </form>

    </div>
  </div>

  <!-- jQuery: CDN with local fallback -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script>
    if (typeof window.jQuery === 'undefined') {
      document.write('<script src="lib/jquery.min.js"><\/script>');
      console.log('jQuery: Loaded from local fallback');
    } else {
      console.log('jQuery: Loaded from CDN');
    }
  </script>

  <!-- Bootstrap JS: CDN with local fallback -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
  <script>
    if (typeof window.bootstrap === 'undefined') {
      document.write('<script src="lib/bootstrap.min.js"><\/script>');
      console.log('Bootstrap JS: Loaded from local fallback');
    } else {
      console.log('Bootstrap JS: Loaded from CDN');
    }
  </script>

  <!-- Axios: CDN with local fallback -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    if (typeof window.axios === 'undefined') {
      document.write('<script src="lib/axios.min.js"><\/script>');
      console.log('Axios: Loaded from local fallback');
    } else {
      console.log('Axios: Loaded from CDN');
    }
  </script>

  <script src="script.js"></script>
</body>

</html>
