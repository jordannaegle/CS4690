<!DOCTYPE html>
<html lang="en-US">

<head>
  <title>Student Logs</title>

  <meta charset="UTF-8">

  <link rel="icon" type="image/png" href="https://www.uvu.edu/favicon.ico">


  <link rel="stylesheet" href="style.css">
</head>

<body>

  <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>

  <form>
    <img src="uvu-seal.jpg" alt="Utah Valley University Seal" class="uvu-logo" id="uvuLogo">
    <h1>Student Logs</h1>
    <select aria-label="Select Course" id="course" name="course" data-cy="course_select">

      <option selected value="">Choose Courses</option>
    </select><br />


    <div id="uvuIdContainer" style="display: none;">
      <label for="uvuId">UVU ID</label><br />

      <input type="text" inputmode="numeric" pattern="[0-9]*" id="uvuId" name="uvuId" data-cy="uvuId_input"
        placeholder="01234567" maxlength="8" onkeypress="return /[0-9]/.test(event.key)" />
    </div>

    <div id="logsSection" style="display: none;">
      <h3 id="uvuIdDisplay" data-cy="uvuIdDisplay">
        Student Logs for 10234567
      </h3>
      <ul data-cy="logs">

        <li>
          <div><small>1/23/2021 1:23:36 PM</small></div>
          <pre><p>Initial comment. Hello World</p></pre>
        </li>
        <li>
          <div><small>1/24/2021 2:43:12 PM</small></div>
          <pre><p>MongoDB is looking really good, still need to get atlas up and running.</p></pre>
        </li>
        <li>
          <div><small>1/27/2021 5:58:10 PM</small></div>
          <pre><p>Atlas is up and running</p></pre>
        </li>
      </ul>

      <label>New Log</label><br />
      <textarea id="addLogTextarea" style="height: 75px" aria-label="add log textarea"
        data-cy="log_textarea"></textarea><br />

      <button id="addLogBtn" type="submit" data-cy="add_log_btn" disabled>Add Log</button>
    </div>

  </form>

  <!-- Axios CDN for AJAX requests -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="script.js"></script>
</body>


</html>
